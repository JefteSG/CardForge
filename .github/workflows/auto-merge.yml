name: Auto Merge PR

on:
  repository_dispatch:
    types: [auto-merge-pr] # você vai chamar esse evento via API

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Merge PR
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ github.event.client_payload.pr_number }}
          merge-method: squash # pode ser merge, squash ou rebase

